use_templates:
  - https://github.com/Charles546/hd-driver-podman/blob/main/hdci.tmpl.yml

executors:
  go-executor:
    image: golang:1.23
    cache:
      - path: /go/pkg/mod
      - path: /root/.cache/go-build

default_executors:
  - with_secret_driver
  - sh-c

default_script_steps:
  - load_secret_driver
  - github_checkout

triggers:
  - conditions:
      gh_event: push
    stages:
      - test
  - conditions:
      gh_event: release
    stages:
      - test
      - publish

stages:
  test:
    jobs:
      - job_name: run_tests
        executor: go-executor
        workflow:
          run: |
            go test -v ./...
    gh_status_message:
      success: "OpenAI driver tests passed!"
      error: "OpenAI driver tests failed."

  publish:
    requires:
      - test
    jobs:
      - job_name: build_and_release
        executor: go-executor
        workflow:
          run: |
            go build -o hd-driver-openai ./cmd/hd-driver-openai
            echo "Preparing semantic release..."
