use_templates:
  - hdci.tmpl.yml

executors:
  go-executor:
    image: golang:1.21-alpine
    env:
      GOPATH: /go
    work_dir: /app

default_executors:
  - with_secret_driver
  - sh-c

default_script_steps:
  - load_secret_driver
  - github_checkout

triggers:
  - conditions:
      gh_event: push
    stages:
      - test
  - conditions:
      gh_event: release
    stages:
      - test
      - publish

stages:
  test:
    jobs:
      run_tests:
        job_name: run_tests
        executor: go-executor
        workflow:
          run: |
            go test -v ./...
    gh_status_message:
      success: "OpenAI driver tests passed!"
      error: "OpenAI driver tests failed."

  publish:
    requires:
      - test
    jobs:
      build_and_release:
        job_name: build_and_release
        executor: go-executor
        workflow:
          run: |
            go build -o hd-driver-openai ./cmd/hd-driver-openai
            # Semantic release logic would be triggered here or via GitHub Release event
            echo "Preparing semantic release..."
